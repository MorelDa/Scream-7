<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scream 7 - HBO Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .hero {
            min-height: 85vh; padding: 60px 5%;
            background: linear-gradient(to top, #000 0%, transparent 50%),
                        linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%),
                        url('https://media.themoviedb.org/t/p/w300_and_h450_face/hflipaW7mtfKZM9WFEyzUdFsgSk.jpg') center/cover;
            display: flex; align-items: center;
        }
        .content { max-width: 600px; }
        .hbo-logo { color: #b4a7d6; font-weight: 800; font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; }
        h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 15px; line-height: 1.1; }
        .meta { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; font-size: 14px; color: #999; }
        .synopsis { color: #ccc; line-height: 1.7; margin-bottom: 30px; font-size: 16px; }
        .btns { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn { display: flex; align-items: center; gap: 10px; padding: 15px 35px; border: none; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-play { background: #fff; color: #000; }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(180,167,214,0.3); }
        .btn-sec { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .player-zone { padding: 40px 5%; }
        .srv-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .hbo-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 12px 24px; border-radius: 25px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .hbo-btn:hover { border-color: #b4a7d6; color: #fff; }
        .hbo-btn.active { background: linear-gradient(135deg, #7b2cbf, #5a189a); border-color: transparent; color: #fff; }
        .video-container { aspect-ratio: 16/9; background: #0a0a0a; border-radius: 12px; overflow: hidden; max-width: 1200px; box-shadow: 0 0 60px rgba(123,44,191,0.15); }
        .video-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <div class="hbo-logo">HBO MAX</div>
            <h1>Scream 7</h1>
            <div class="meta">
                <span>2026</span>
                <span>1h 54m</span>
                <span>Terror | Misterio | Crimen</span>
            </div>
            <p class="synopsis">Cuando un nuevo asesino Ghostface aparece en el tranquilo pueblo donde Sidney Prescott ha construido una nueva vida, sus peores miedos se hacen realidad cuando su hija se convierte en el siguiente obj...</p>
            <div class="btns">
                <button class="btn btn-play" onclick="document.querySelector('.player-zone').scrollIntoView({behavior:'smooth'})">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l15 8-15 8z"/></svg>
                    Reproducir
                </button>
                <button class="btn btn-sec">+ Mi Lista</button>
            </div>
        </div>
    </div>
    <div class="player-zone">
        <div class="srv-row"><button class="hbo-btn active" onclick="hboSw(0)">Servidor 1</button></div>
        <div class="video-container"><iframe id="hbo-0" src="https://cue.cuevana3.nu/embed-page?showEmbed=aHR0cHM6Ly92aW1lb3MubmV0L2VtYmVkLWMxZWRmYmY4Z3VidC5odG1s" style="display:block" allowfullscreen></iframe></div>
    </div>
    <script>
        const tot = 1;
        function hboSw(i) {
            for(let x=0;x<tot;x++) { document.getElementById('hbo-'+x).style.display = 'none'; document.querySelectorAll('.hbo-btn')[x].classList.remove('active'); }
            document.getElementById('hbo-'+i).style.display = 'block';
            document.querySelectorAll('.hbo-btn')[i].classList.add('active');
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
